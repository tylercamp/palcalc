# This workflow builds artifacts when run manually and publishes them when a release is published
name: Build / Publish Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies (with win-x64 and ReadyToRun)
        run: dotnet restore --runtime win-x64 /p:PublishReadyToRun=true

      # Note: Configuration, Platform, Runtime Identifier are ignored from PublishProfiles, these must be set explicitly
      #       https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet-publish#pubxml-files

      - name: Build solution
        run: dotnet build --configuration Release /p:Platform=x64 --no-restore

      - name: Publish NonBundled profile (multiple files)
        run: dotnet publish PalCalc.UI/PalCalc.UI.csproj --configuration Release_NoBundle -r win-x64 /p:Platform=x64 /p:PublishProfile=Properties/PublishProfiles/NonBundled.pubxml --output publish/NonBundled

      - name: Zip NonBundled output
        run: Compress-Archive -Path publish/NonBundled/* -DestinationPath publish/PalCalc-NoBundle.zip
        shell: pwsh

      - name: Upload NonBundled ZIP
        uses: actions/upload-artifact@v7
        with:
          path: publish/PalCalc-NoBundle.zip
          archive: false

      - name: Upload release asset for Non-Bundled ZIP
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1.10.2
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: publish/PalCalc-NoBundle.zip

      - name: Publish Bundled profile (single EXE)
        run: dotnet publish PalCalc.UI/PalCalc.UI.csproj --configuration Release -r win-x64 /p:Platform=x64 /p:PublishProfile=Properties/PublishProfiles/Bundled.pubxml --output publish/Bundled

      - name: Upload Bundled EXE
        uses: actions/upload-artifact@v7
        with:
          path: publish/Bundled/*.exe
          archive: false

      - name: Upload release asset for Bundled EXE
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1.10.2
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: publish/Bundled/PalCalc.UI.exe
